services:
  web:
    build: .
    container_name: floremoria_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://floremoria:floremoria_pw@db:5432/floremoria?schema=public
      - ADMIN_API_KEY=change-me
      - FLOREMORIA_WEBHOOK_KEY=AG-88a4b29c-WEBHOOK-TOKEN
    depends_on:
      - db
  db:
    image: postgres:16-alpine
    container_name: floremoria_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: floremoria
      POSTGRES_PASSWORD: floremoria_pw
      POSTGRES_DB: floremoria
    ports:
      - "5432:5432"
    volumes:
      - floremoria_pgdata:/var/lib/postgresql/data

volumes:
  floremoria_pgdata:
