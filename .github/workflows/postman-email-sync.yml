name: POSTMAN email sync

on:
  schedule:
    # Backup IMAP: ogni 5 minuti (GitHub Actions minimum).
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: postman-email-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Trigger POSTMAN IMAP sync (production)
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET non configurato nei GitHub Secrets — skip."
            exit 0
          fi
          curl -fsS --max-time 120 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "https://www.floremoria.com/api/cron/postman-sync"
